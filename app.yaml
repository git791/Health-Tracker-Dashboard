# Databricks App Configuration
# This file defines how your app runs on Databricks

command: ["streamlit", "run", "health_tracker_app.py", "--server.port", "8080", "--server.address", "0.0.0.0"]

env:
  - name: STREAMLIT_SERVER_HEADLESS
    value: "true"
  - name: STREAMLIT_BROWSER_GATHER_USAGE_STATS
    value: "false"
